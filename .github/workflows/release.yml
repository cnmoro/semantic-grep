name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            ext: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation deps (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
        shell: bash

      - name: Set linker for linux arm64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
        shell: bash

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BIN="semanticgrep${{ matrix.ext }}"
          SRC="target/${{ matrix.target }}/release/$BIN"
          STAGING="semanticgrep-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "$SRC" "$STAGING/"
          cp README.md LICENSE "$STAGING/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a -tzip "${STAGING}.zip" "$STAGING/"
          else
            tar czf "${STAGING}.tar.gz" "$STAGING/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semanticgrep-${{ matrix.target }}
          path: semanticgrep-${{ matrix.target }}.*

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
